services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: synapse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synapse}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - synapse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synapse} -d ${POSTGRES_DB:-synapse}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrator:
    image: postgres:16
    container_name: synapse-migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ../infra/postgres/migrations:/migrations:ro
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        for migration in /migrations/*.sql; do
          echo "Applying $${migration}"
          psql "$${DATABASE_URL}" -v ON_ERROR_STOP=1 -f "$${migration}" >/dev/null
        done
        echo "Migrations applied"
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: synapse-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SYNAPSE_UI_ORIGINS: ${SYNAPSE_UI_ORIGINS:-*}
      SYNAPSE_INCIDENT_SECRET_RBAC_MODE: ${SYNAPSE_INCIDENT_SECRET_RBAC_MODE:-open}
      IDEMPOTENCY_TTL_SECONDS: ${IDEMPOTENCY_TTL_SECONDS:-86400}
      IDEMPOTENCY_IN_PROGRESS_WAIT_SECONDS: ${IDEMPOTENCY_IN_PROGRESS_WAIT_SECONDS:-5.0}
      IDEMPOTENCY_CLEANUP_INTERVAL_SECONDS: ${IDEMPOTENCY_CLEANUP_INTERVAL_SECONDS:-60.0}
      IDEMPOTENCY_CLEANUP_BATCH_SIZE: ${IDEMPOTENCY_CLEANUP_BATCH_SIZE:-1000}
    ports:
      - "${SYNAPSE_API_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ..
      dockerfile: services/worker/Dockerfile
    container_name: synapse-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SYNAPSE_API_URL: ${SYNAPSE_API_URL:-http://api:8080}
      SYNAPSE_WORKER_ENABLE_INTELLIGENCE: ${SYNAPSE_WORKER_ENABLE_INTELLIGENCE:-1}
      SYNAPSE_WORKER_SYNTHESIS_INTERVAL_SEC: ${SYNAPSE_WORKER_SYNTHESIS_INTERVAL_SEC:-15}
      SYNAPSE_WORKER_SYNTHESIS_LIMIT: ${SYNAPSE_WORKER_SYNTHESIS_LIMIT:-100}
      SYNAPSE_WORKER_SYNTHESIS_EXTRACT_LIMIT: ${SYNAPSE_WORKER_SYNTHESIS_EXTRACT_LIMIT:-200}
      SYNAPSE_WORKER_INTELLIGENCE_INTERVAL_SEC: ${SYNAPSE_WORKER_INTELLIGENCE_INTERVAL_SEC:-600}
      SYNAPSE_WORKER_INTELLIGENCE_DELIVERY_LIMIT: ${SYNAPSE_WORKER_INTELLIGENCE_DELIVERY_LIMIT:-200}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}

  mcp:
    build:
      context: ..
      dockerfile: services/mcp/Dockerfile
    container_name: synapse-mcp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SYNAPSE_MCP_TRANSPORT: ${SYNAPSE_MCP_TRANSPORT:-http}
      SYNAPSE_MCP_HOST: 0.0.0.0
      SYNAPSE_MCP_PORT: ${SYNAPSE_MCP_PORT:-8091}
      SYNAPSE_MCP_CACHE_TTL_SEC: ${SYNAPSE_MCP_CACHE_TTL_SEC:-5}
      SYNAPSE_MCP_CACHE_MAX_ENTRIES: ${SYNAPSE_MCP_CACHE_MAX_ENTRIES:-5000}
      SYNAPSE_MCP_GRAPH_MAX_HOPS: ${SYNAPSE_MCP_GRAPH_MAX_HOPS:-3}
      SYNAPSE_MCP_GRAPH_BOOST_HOP1: ${SYNAPSE_MCP_GRAPH_BOOST_HOP1:-0.20}
      SYNAPSE_MCP_GRAPH_BOOST_HOP2: ${SYNAPSE_MCP_GRAPH_BOOST_HOP2:-0.12}
      SYNAPSE_MCP_GRAPH_BOOST_HOP3: ${SYNAPSE_MCP_GRAPH_BOOST_HOP3:-0.06}
      SYNAPSE_MCP_GRAPH_BOOST_OTHER: ${SYNAPSE_MCP_GRAPH_BOOST_OTHER:-0.03}
    ports:
      - "${SYNAPSE_MCP_PORT:-8091}:8091"

volumes:
  synapse_postgres_data:
