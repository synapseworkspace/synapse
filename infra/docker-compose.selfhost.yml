services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synapse}
    ports:
      - "${SYNAPSE_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-55432}:5432"
    volumes:
      - synapse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synapse} -d ${POSTGRES_DB:-synapse}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrator:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ../infra/postgres/migrations:/migrations:ro
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        for migration in /migrations/*.sql; do
          echo "Applying $${migration}"
          psql "$${DATABASE_URL}" -v ON_ERROR_STOP=1 -f "$${migration}" >/dev/null
        done
        echo "Migrations applied"
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SYNAPSE_UI_ORIGINS: ${SYNAPSE_UI_ORIGINS:-*}
      SYNAPSE_INCIDENT_SECRET_RBAC_MODE: ${SYNAPSE_INCIDENT_SECRET_RBAC_MODE:-open}
      IDEMPOTENCY_TTL_SECONDS: ${IDEMPOTENCY_TTL_SECONDS:-86400}
      IDEMPOTENCY_IN_PROGRESS_WAIT_SECONDS: ${IDEMPOTENCY_IN_PROGRESS_WAIT_SECONDS:-5.0}
      IDEMPOTENCY_CLEANUP_INTERVAL_SECONDS: ${IDEMPOTENCY_CLEANUP_INTERVAL_SECONDS:-60.0}
      IDEMPOTENCY_CLEANUP_BATCH_SIZE: ${IDEMPOTENCY_CLEANUP_BATCH_SIZE:-1000}
    ports:
      - "${SYNAPSE_BIND_HOST:-127.0.0.1}:${SYNAPSE_API_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ..
      dockerfile: services/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SYNAPSE_API_URL: ${SYNAPSE_API_URL:-http://api:8080}
      SYNAPSE_WORKER_ENABLE_INTELLIGENCE: ${SYNAPSE_WORKER_ENABLE_INTELLIGENCE:-1}
      SYNAPSE_WORKER_SYNTHESIS_INTERVAL_SEC: ${SYNAPSE_WORKER_SYNTHESIS_INTERVAL_SEC:-15}
      SYNAPSE_WORKER_SYNTHESIS_LIMIT: ${SYNAPSE_WORKER_SYNTHESIS_LIMIT:-100}
      SYNAPSE_WORKER_SYNTHESIS_EXTRACT_LIMIT: ${SYNAPSE_WORKER_SYNTHESIS_EXTRACT_LIMIT:-200}
      SYNAPSE_WORKER_INTELLIGENCE_INTERVAL_SEC: ${SYNAPSE_WORKER_INTELLIGENCE_INTERVAL_SEC:-600}
      SYNAPSE_WORKER_INTELLIGENCE_DELIVERY_LIMIT: ${SYNAPSE_WORKER_INTELLIGENCE_DELIVERY_LIMIT:-200}
      SYNAPSE_WORKER_ENABLE_AGENT_WORKLOGS: ${SYNAPSE_WORKER_ENABLE_AGENT_WORKLOGS:-1}
      SYNAPSE_WORKER_AGENT_WORKLOGS_INTERVAL_SEC: ${SYNAPSE_WORKER_AGENT_WORKLOGS_INTERVAL_SEC:-86400}
      SYNAPSE_WORKER_AGENT_WORKLOGS_DISCOVER_LIMIT: ${SYNAPSE_WORKER_AGENT_WORKLOGS_DISCOVER_LIMIT:-500}
      SYNAPSE_WORKER_AGENT_WORKLOGS_DAYS_BACK: ${SYNAPSE_WORKER_AGENT_WORKLOGS_DAYS_BACK:-1}
      SYNAPSE_WORKER_AGENT_WORKLOGS_MAX_AGENTS: ${SYNAPSE_WORKER_AGENT_WORKLOGS_MAX_AGENTS:-500}
      SYNAPSE_WORKER_AGENT_WORKLOGS_MAX_LOGS_PER_PAGE: ${SYNAPSE_WORKER_AGENT_WORKLOGS_MAX_LOGS_PER_PAGE:-14}
      SYNAPSE_WORKER_AGENT_WORKLOGS_INCLUDE_RETIRED: ${SYNAPSE_WORKER_AGENT_WORKLOGS_INCLUDE_RETIRED:-0}
      SYNAPSE_WORKER_AGENT_WORKLOGS_RESPECT_SCHEDULE: ${SYNAPSE_WORKER_AGENT_WORKLOGS_RESPECT_SCHEDULE:-1}
      SYNAPSE_WORKER_ENABLE_AGENT_WORKLOGS_REALTIME: ${SYNAPSE_WORKER_ENABLE_AGENT_WORKLOGS_REALTIME:-1}
      SYNAPSE_WORKER_AGENT_WORKLOGS_REALTIME_INTERVAL_SEC: ${SYNAPSE_WORKER_AGENT_WORKLOGS_REALTIME_INTERVAL_SEC:-300}
      SYNAPSE_WORKER_AGENT_WORKLOGS_REALTIME_LOOKBACK_MINUTES: ${SYNAPSE_WORKER_AGENT_WORKLOGS_REALTIME_LOOKBACK_MINUTES:-15}
      SYNAPSE_AGENT_WORKLOG_GENERATED_BY: ${SYNAPSE_AGENT_WORKLOG_GENERATED_BY:-agent_worklog_scheduler}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_SYNAPSE_API_URL: ${SYNAPSE_WEB_API_URL:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${SYNAPSE_BIND_HOST:-127.0.0.1}:${SYNAPSE_WEB_PORT:-4173}:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/ >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  mcp:
    build:
      context: ..
      dockerfile: services/mcp/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SYNAPSE_MCP_TRANSPORT: ${SYNAPSE_MCP_TRANSPORT:-streamable-http}
      SYNAPSE_MCP_HOST: 0.0.0.0
      SYNAPSE_MCP_PORT: ${SYNAPSE_MCP_PORT:-8091}
      SYNAPSE_MCP_CACHE_TTL_SEC: ${SYNAPSE_MCP_CACHE_TTL_SEC:-5}
      SYNAPSE_MCP_CACHE_MAX_ENTRIES: ${SYNAPSE_MCP_CACHE_MAX_ENTRIES:-5000}
      SYNAPSE_MCP_GRAPH_MAX_HOPS: ${SYNAPSE_MCP_GRAPH_MAX_HOPS:-3}
      SYNAPSE_MCP_GRAPH_BOOST_HOP1: ${SYNAPSE_MCP_GRAPH_BOOST_HOP1:-0.20}
      SYNAPSE_MCP_GRAPH_BOOST_HOP2: ${SYNAPSE_MCP_GRAPH_BOOST_HOP2:-0.12}
      SYNAPSE_MCP_GRAPH_BOOST_HOP3: ${SYNAPSE_MCP_GRAPH_BOOST_HOP3:-0.06}
      SYNAPSE_MCP_GRAPH_BOOST_OTHER: ${SYNAPSE_MCP_GRAPH_BOOST_OTHER:-0.03}
    ports:
      - "${SYNAPSE_BIND_HOST:-127.0.0.1}:${SYNAPSE_MCP_PORT:-8091}:8091"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; s=socket.create_connection(('127.0.0.1', int('${SYNAPSE_MCP_PORT:-8091}')), 2); s.close()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  synapse_postgres_data:
