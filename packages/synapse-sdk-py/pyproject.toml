[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "synapseworkspace-sdk"
version = "0.1.1"
description = "Synapse universal Python SDK"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = ["requests>=2.31.0"]
authors = [{name = "Synapse Core Team"}]
keywords = ["ai", "agents", "mcp", "knowledge", "observability", "sdk"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Libraries",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Homepage = "https://github.com/synapseworkspace/synapse"
Repository = "https://github.com/synapseworkspace/synapse"
Documentation = "https://github.com/synapseworkspace/synapse/tree/main/docs"
Issues = "https://github.com/synapseworkspace/synapse/issues"

[project.optional-dependencies]
otel = ["opentelemetry-api>=1.28.0"]

[project.scripts]
synapse-cli = "synapse_sdk.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
